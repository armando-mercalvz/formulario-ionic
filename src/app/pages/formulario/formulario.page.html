<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>formulario</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
  </ion-header>
  <ion-toolbar>
    <ion-title size="large">formulario</ion-title>
  </ion-toolbar>

    <ion-list>
      <ion-item>
        <ion-input label="Nombre de producto" type="text" placeholder="Coca cola"></ion-input>
      </ion-item>
      <ion-item>
        <ion-input label="Precio unitario" type="number" placeholder="10"></ion-input>
      </ion-item>
      <ion-item>
        <ion-input label="Unidades de stock" type="number" placeholder="10"></ion-input>
      </ion-item>
      <ion-item>
        <ion-input label="Imegen" type="text" placeholder="Opcional"></ion-input>
      </ion-item>
    </ion-list>
    <ion-button>Guardar</ion-button>
    <ion-button [disabled]="false" color="light">Cancelar</ion-button>
</ion-content>
